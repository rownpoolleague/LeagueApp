<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handicap Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --light: #f8fafc;
            --dark: #1e293b;
        }
        body { font-family: system-ui, sans-serif; padding: 20px; background: var(--light); color: var(--dark); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { margin-top: 0; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover { background: #1d4ed8; }
        
        #result { margin-top: 25px; display: none; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        .hc-display { font-size: 3rem; font-weight: 800; text-align: center; margin: 10px 0; color: var(--dark); }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1rem; }
        .highlight { font-weight: bold; color: var(--primary); }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .used-row { background: #dcfce7; font-weight: bold; color: #166534; }
        .ignored-row { color: #94a3b8; }
        .status-msg { font-size: 0.85rem; color: #64748b; font-style: italic; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Player Handicap Search</h2>
    <input type="text" id="playerName" placeholder="Enter Player Name (Exact)..." onkeypress="if(event.key==='Enter') calculatePlayerHC()">
    <button onclick="calculatePlayerHC()">Calculate Performance</button>

    <div id="result">
        <div class="hc-display" id="displayHC">--</div>
        
        <div class="stat-line"><span>Average Hash (Best 5):</span> <span id="avgHash" class="highlight">--</span></div>
        <div class="stat-line"><span>Win Rate (Last 10):</span> <span id="winRate" class="highlight">--</span></div>
        <div class="stat-line"><span>Lifetime Floor:</span> <span id="floorVal" class="highlight">--</span></div>
        
        <table>
            <thead>
                <tr>
                    <th>Hash</th>
                    <th>Result</th>
                    <th>Innings</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
        
        <p id="statusMsg" class="status-msg"></p>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyuOCGak8yLXmXzhevqnATNx4JRbzGa8dw2EsvJs4r0ADV6wEScNnXfhzcFlC7C5RhA/exec";

    const RULES = {
        brackets: [
            { max: 2.0, hc: 7 },
            { max: 3.0, hc: 6 },
            { max: 4.0, hc: 5 },
            { max: 6.0, hc: 4 },
            { max: 8.0, hc: 3 },
            { max: 99.0, hc: 2 }
        ],
        e8Penalty: 2,
        weeksForFloor: 10
    };

    async function calculatePlayerHC() {
        const nameInput = document.getElementById('playerName').value.trim();
        if (!nameInput) return;

        try {
            const response = await fetch("https://script.google.com/macros/s/AKfycbyuOCGak8yLXmXzhevqnATNx4JRbzGa8dw2EsvJs4r0ADV6wEScNnXfhzcFlC7C5RhA/exec");
            const data = await response.json();
            const rows = data.slice(1); // Remove header row

            // 1. Process matches: Deduplicate, Average, and apply E8 Rules
            const playerHistory = processPlayerData(rows, nameInput);
            
            if (playerHistory.length === 0) {
                alert("No match history found for: " + nameInput);
                return;
            }

            // 2. Get Statistics
            const last10 = playerHistory.slice(-10).reverse(); // Newest first
            const wins = last10.filter(m => m.won).length;
            const winRate = wins / last10.length;

            // 3. Find Best 5 Hashes
            let allHashes = last10.map(m => m.hash);
            let sortedHashes = [...allHashes].sort((a, b) => a - b);
            let best5 = sortedHashes.slice(0, 5);
            let avgHash = best5.reduce((a, b) => a + b, 0) / 5;

            // 4. Determine Bracket HC and Floor
            let calculatedHC = RULES.brackets.find(b => avgHash <= b.max).hc;
            let floor = calculateFloor(playerHistory);
            let finalHC = Math.max(calculatedHC, floor);

            // 5. Render to Screen
            renderUI(finalHC, avgHash, winRate, floor, last10, best5, nameInput);

        } catch (e) {
            console.error(e);
            alert("Error fetching data. Check your Google URL and Deployment settings.");
        }
    }

    function processPlayerData(rows, target) {
        let clean = [];
        let seenKeys = new Set();

        rows.forEach((row, idx) => {
            const isLW = row[3] === target;
            const isLL = row[4] === target;
            if (!isLW && !isLL) return;

            const key = `${row[0]}_${row[1]}_${row[2]}`; // Date_Home_Away
            if (seenKeys.has(key)) return;

            // Look for partner submission
            const dup = rows.find((r, dIdx) => `${r[0]}_${r[1]}_${r[2]}` === key && dIdx !== idx);
            
            // Average Innings Rule
            let baseInnings = dup ? Math.floor((row[5] + dup[5]) / 2) : row[5];
            
            // E8 Bonus Rule: If opponent got an E8, player gets +2 innings (helps hash)
            let opponentHadE8 = isLW ? (row[17] > 0 || (dup && dup[17] > 0)) 
                                     : (row[11] > 0 || (dup && dup[11] > 0));
            
            let effInnings = baseInnings + (opponentHadE8 ? RULES.e8Penalty : 0);
            
            // Stats for Hash Calculation (Wins and Safeties)
            let pWins = isLW ? row[7] : row[14];
            let pSafes = isLW ? row[8] : row[15];
            let pHash = pWins > 0 ? (effInnings - pSafes) / pWins : 10;

            clean.push({
                date: new Date(row[0]).toLocaleDateString(),
                hash: pHash,
                won: row[18] === target,
                effInnings: effInnings,
                hcAtTime: isLW ? row[6] : row[13]
            });
            seenKeys.add(key);
        });
        return clean;
    }

    function calculateFloor(history) {
        let hcCounts = {};
        history.forEach(m => {
            hcCounts[m.hcAtTime] = (hcCounts[m.hcAtTime] || 0) + 1;
        });
        
        let maxQualifiedHC = 2;
        for (let hc in hcCounts) {
            if (hcCounts[hc] >= RULES.weeksForFloor) {
                maxQualifiedHC = Math.max(maxQualifiedHC, parseInt(hc));
            }
        }
        return maxQualifiedHC - 1;
    }

    function renderUI(finalHC, avgHash, winRate, floor, last10, best5, name) {
        document.getElementById('result').style.display = "block";
        document.getElementById('displayHC').innerText = finalHC;
        document.getElementById('avgHash').innerText = avgHash.toFixed(2);
        document.getElementById('winRate').innerText = Math.round(winRate * 100) + "%";
        document.getElementById('floorVal').innerText = floor;

        const tableBody = document.getElementById('historyBody');
        tableBody.innerHTML = "";

        last10.forEach(m => {
            const isUsed = best5.includes(m.hash);
            const rowClass = isUsed ? 'used-row' : 'ignored-row';
            
            tableBody.innerHTML += `
                <tr class="${rowClass}">
                    <td>${m.hash.toFixed(2)}</td>
                    <td>${m.won ? 'WIN' : 'LOSS'}</td>
                    <td>${m.effInnings}</td>
                    <td>${m.date}</td>
                </tr>
            `;
        });

        const status = document.getElementById('statusMsg');
        status.innerText = (finalHC > floor) ? "Calculated by performance." : "Locked by Lifetime Floor.";
    }
</script>

</body>
</html>
